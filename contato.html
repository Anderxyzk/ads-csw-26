<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="contato.css">
</head>

<body>
    <header class="header">
        <nav class="navbar">
            <ul class="nav-list">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="github.html" class="nav-link">GitHub</a></li>
                <li class="nav-item"><a href="curriculo.html" class="nav-link">Currículo</a></li>
                <li class="nav-item"><a href="servicos.html" class="nav-link">Serviços</a></li>
                <li class="nav-item"><a href="contato.html" class="nav-link active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-container">
        <section class="section">
            <h1>Contato</h1>
            <p>Entre em contato comigo para discutir seu projeto e obter um orçamento personalizado. Estou ansioso para colaborar com você e criar soluções web incríveis!</p>

            <div class="card mt-lg">
                <form id="contatoForm">
                    <div class="form-group">
                        <label for="name">Nome completo:</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Telefone:</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="client-type">Tipo de Cliente:</label>
                        <select id="client-type" name="client-type" required>
                            <option value="">-- Selecione um tipo --</option>
                            <option value="Pessoa Física">Pessoa Física</option>
                            <option value="PJ">PJ</option>
                        </select>
                    </div>

                    <div class="form-group" id="cpf-group" style="display: none;">
                        <label for="cpf">CPF:</label>
                        <input type="text" id="cpf" name="cpf" placeholder="XXX.XXX.XXX-XX">
                    </div>

                    <div class="form-group" id="cnpj-group" style="display: none;">
                        <label for="cnpj">CNPJ:</label>
                        <input type="text" id="cnpj" name="cnpj" placeholder="XX.XXX.XXX/XXXX-XX">
                    </div>

                    <div class="form-group">
                        <label for="best-time">Qual melhor data e horário para contato?</label>
                        <input type="datetime-local" id="best-time" name="best-time" required>
                    </div>

                    <div class="form-group">
                        <label for="service-type">Tipo de Serviço:</label>
                        <select id="service-type" name="service-type" required>
                            <option value="">-- Selecione um serviço --</option>
                            <option value="Página Estática">Página Estática</option>
                            <option value="Página Dinâmica">Página Dinâmica</option>
                            <option value="Página super avançada">Página super avançada</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Descreva seu projeto:</label>
                        <textarea id="description" name="description" placeholder="Explique detalhadamente o que você deseja que seja desenvolvido..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg">Enviar</button>
                </form>
            </div>
        </section>
    </main>
    <script>
        const clientTypeSelect = document.getElementById('client-type');
        const cpfGroup = document.getElementById('cpf-group');
        const cnpjGroup = document.getElementById('cnpj-group');

        clientTypeSelect.addEventListener('change', function () {
            if (this.value === 'Pessoa Física') {
                cpfGroup.style.display = 'block';
                cnpjGroup.style.display = 'none';
                document.getElementById('cpf').required = true;
                document.getElementById('cnpj').required = false;
            } else if (this.value === 'PJ') {
                cpfGroup.style.display = 'none';
                cnpjGroup.style.display = 'block';
                document.getElementById('cpf').required = false;
                document.getElementById('cnpj').required = true;
            } else {
                cpfGroup.style.display = 'none';
                cnpjGroup.style.display = 'none';
                document.getElementById('cpf').required = false;
                document.getElementById('cnpj').required = false;
            }
        });
    </script>

    <script type="module" src="../scripts/script.js"></script>
</body>

</html>
