<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 09</title>
</head>
<body>

<h1>Formulário</h1>

<form>
    <table border="1">
        <tr>
            <td><label for="fname">Nome:</label></td>
            <td><input type="text" id="fname" name="fname"></td>
        </tr>

        <tr>
            <td><label for="personalemail">E-mail:</label></td>
            <td><input type="email" id="personalemail" name="personalemail"></td>
        </tr>

        <tr>
            <td><label for="patteremail">E-mail (Pattern):</label></td>
            <td><input type="email" id="patteremail" name="patteremail"></td>
        </tr>

        <tr>
            <td><label for="pswd">Senha:</label></td>
            <td><input type="password" id="pswd" name="pswd"></td>
        </tr>

        <tr>
            <td><label for="old">Idade:</label></td>
            <td><input type="number" id="old" name="old"></td>
        </tr>

        <tr>
            <td colspan="2"><label for="comentario">Deixe um comentário:</label><br>
            <textarea id="comentario" name="comentario" rows="4"></textarea></td>
        </tr>

        <tr>
            <td>
                <label>Matéria de Interesse:</label><br>
                <input type="checkbox" name="materia" value="backend"> Backend<br>
                <input type="checkbox" name="materia" value="frontend"> Frontend<br>
                <input type="checkbox" name="materia" value="fullstack"> FullStack
            </td>

            <td>
                <label>Tipo de Viagem:</label><br>
                <input type="checkbox" name="viagem" value="negocios"> Negócios<br>
                <input type="checkbox" name="viagem" value="lazer"> Lazer<br>
                <input type="checkbox" name="viagem" value="turismo"> Turismo<br>
                <input type="checkbox" name="viagem" value="academico"> Acadêmico
            </td>
        </tr>

        <tr>
            <td>
                <label for="esporte">Esporte Favorito:</label>
                <select id="esporte" name="esporte" class="small-input select-input">
                    <option>Futebol</option>
                    <option>Vôlei</option>
                    <option>Basquete</option>
                    <option>Natação</option>
                    <option>Corrida</option>
                </select>
            </td>

            <td>
                <label for="investimentos">Investimentos:</label>
                <select id="investimentos" name="investimentos" class="small-input select-input">
                    <option>Ações</option>
                    <option>Criptomoedas</option>
                    <option>Renda Fixa</option>
                    <option>Fundos Imobiliários</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>
                <label for="cor">Escolha uma cor:</label>
                <input type="color" id="cor" name="cor" class="small-input color-input">
            </td>
            <td>
                <label for="arquivo">Selecione um arquivo:</label>
                <input type="file" id="arquivo" name="arquivo" class="small-input file-input">
            </td>
        </tr>

        <tr>
            <td colspan="2">
                <label for="data">Data e Hora de envio:</label>
                <input type="date" id="data" name="data" class="small-input date-input">
                <input type="time" id="hora" name="hora" class="small-input time-input">
            </td>
        </tr>

    </table>
</form>

</body>
</html>
